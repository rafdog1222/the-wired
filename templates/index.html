<!DOCTYPE html>
<html>
<head>
    <title>the wired</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff99;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 1px solid #00ff99;
            padding: 40px;
            text-align: center;
        }
        h1 { font-size: 2em; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        input {
            background: #0a0a0a;
            border: 1px solid #00ff99;
            color: #00ff99;
            padding: 10px;
            font-family: monospace;
            font-size: 1em;
            width: 250px;
        }
        button {
            display: block;
            margin: 15px auto 0;
            background: none;
            border: 1px solid #00ff99;
            color: #00ff99;
            padding: 10px 30px;
            font-family: monospace;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover { background: #00ff99; color: #0a0a0a; }
    </style>
</head>
<body>
    <div class="box">
        <h1>the wired</h1>
        <p>we are all connected</p>
        <form method="POST">
            <input type="text" name="email" placeholder="enter your email" required />
            <button type="submit">enter the wired</button>
        </form>
    </div>
</body>
</html>
