<!DOCTYPE html>
<html>
<head>
    <title>the wired</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff99;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 1px solid #00ff99;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }
        h1 { font-size: 2em; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        .btn {
            display: block;
            margin: 12px auto;
            background: none;
            border: 1px solid #00ff99;
            color: #00ff99;
            padding: 10px 30px;
            font-family: monospace;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            width: 200px;
        }
        .btn:hover { background: #00ff99; color: #0a0a0a; }
        .btn.secondary {
            border-color: #333;
            color: #888;
        }
        .btn.secondary:hover { border-color: #00ff99; color: #00ff99; background: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>the wired</h1>
        <p>we are all connected</p>
        <a href="/signup" class="btn">join the wired</a>
        <a href="/login" class="btn secondary">sign in</a>
    </div>
</body>
</html>
